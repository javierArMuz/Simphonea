name: Build Simphonea APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.2 platform-tools'

      - name: Initialize Capacitor Project
        run: |
          # Create a dummy package.json
          echo '{"name": "simphonea", "version": "1.0.0"}' > package.json
          
          # Install dependencies LOCALLY (Capacitor requires this)
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Setup web directory
          mkdir -p www
          cp DISEÑO.HTML www/index.html
          cp manifest.json www/
          
          # Initialize Capacitor
          npx cap init Simphonea com.simphonea.app --web-dir www
          
          # Add Android platform
          npx cap add android

      - name: Build Android APK
        run: |
          cd android
          # Run gradle build
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Move and rename the APK
          mv app/build/outputs/apk/debug/app-debug.apk ../Simphonea.apk

      - name: Upload Simphonea APK
        uses: actions/upload-artifact@v4
        with:
          name: Simphonea-APK
          path: Simphonea.apk