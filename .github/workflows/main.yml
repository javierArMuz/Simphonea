name: Build Simphonea APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (Dynamic Paths)
        run: |
          mkdir -p ~/.bubblewrap
          # Use environment variables provided by GitHub Runner
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          # Show the config for debugging
          cat ~/.bubblewrap/config.json
          # Check if the paths exist
          ls -d $JAVA_HOME
          ls -d $ANDROID_SDK_ROOT

      - name: Build APK
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "com.simphonea.app",
            "host": "simphonea.app",
            "name": "Simphonea",
            "launcherName": "Simphonea",
            "display": "standalone",
            "themeColor": "#fbbf24",
            "navigationColor": "#050506",
            "backgroundColor": "#050506",
            "startUrl": "/",
            "iconUrl": "https://cdn-icons-png.flaticon.com/512/3063/3063713.png",
            "maskableIconUrl": "https://cdn-icons-png.flaticon.com/512/3063/3063713.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json",
            "fallbackType": "custom_tabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableNotifications": false,
            "enableInAppBilling": false,
            "locationDelegation": false,
            "playServicesMeasurementId": null,
            "orientation": "portrait",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "recreateCLIConfig": false,
            "signingKey": {
              "path": "./my-release-key.keystore",
              "alias": "my-key-alias"
            }
          }
          EOF

          # Generate a temporary keystore
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Simphonea, OU=Dev, O=Simphonea, L=Any, S=Any, C=US"

          # Initialize and build (skipping doctor if it's too picky)
          yes | bubblewrap init --manifest ./twa-manifest.json || true
          yes | bubblewrap build --skipCheck --signingKeyPath ./my-release-key.keystore --signingKeyAlias my-key-alias --signingKeyPassword password --signingStorePassword password
          
          # Find and rename the APK
          find . -name "*.apk" -exec mv {} Simphonea.apk \;

      - name: Upload Simphonea APK
        uses: actions/upload-artifact@v4
        with:
          name: Simphonea-APK
          path: Simphonea.apk