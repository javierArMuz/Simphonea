<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simphonea - Professional Guitar Suite</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050506;
            color: #f4f4f5;
        }


        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                opacity: 0.1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .animate-pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .amber-glow {
            box-shadow: 0 0 40px -10px rgba(251, 191, 36, 0.15);
        }

        .tuner-ring {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

</head>

<body class="selection:bg-amber-500 selection:text-zinc-950">

        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-amber-900/10 blur-[120px] rounded-full">

        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4 group">
                <div class="relative w-12 h-12 glass rounded-2xl flex items-center justify-center overflow-hidden amber-glow group-hover:scale-105 transition-transform">
                    <i data-lucide="guitar" class="w-6 h-6 text-amber-500 opacity-80 group-hover:opacity-100 transition-opacity"></i>
                    <div class="absolute inset-0 bg-gradient-to-tr from-amber-500/20 to-transparent"></div>
                </div>

                <div>
                    <h1 class="text-xl font-extrabold tracking-tight flex items-center gap-2">

                            class="text-[10px] font-bold bg-amber-500/10 text-amber-500 px-1.5 py-0.5 rounded border border-amber-500/20">PRO</span>
                    </h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em] -mt-0.5">Professional Artist

                    <div class="absolute inset-0 opacity-10 pointer-events-none">

        </button>
        <button onclick="switchTab('ideas')" id="nav-ideas"
            class="nav-btn relative px-5 py-3 rounded-[1.5rem] flex items-center gap-3 transition-all duration-500 text-zinc-500 hover:text-zinc-300">
            <i data-lucide="edit-3" class="w-5 h-5"></i>

    <div
        class="fixed bottom-0 left-0 w-full h-[30vh] bg-gradient-to-t from-zinc-950 to-transparent pointer-events-none -z-10">
    </div>

    <script>
        // --- CONSTANTS & HELPERS ---
        const NOTE_STRINGS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const TUNINGS = [
            { name: "Estándar", notes: [{ n: "E2", f: 82.41 }, { n: "A2", f: 110.00 }, { n: "D3", f: 146.83 }, { n: "G3", f: 196.00 }, { n: "B3", f: 246.94 }, { n: "E4", f: 329.63 }] },
            { name: "Drop D", notes: [{ n: "D2", f: 73.42 }, { n: "A2", f: 110.00 }, { n: "D3", f: 146.83 }, { n: "G3", f: 196.00 }, { n: "B3", f: 246.94 }, { n: "E4", f: 329.63 }] },
            { name: "Open G", notes: [{ n: "D2", f: 73.42 }, { n: "G2", f: 98.00 }, { n: "D3", f: 146.83 }, { n: "G3", f: 196.00 }, { n: "B3", f: 246.94 }, { n: "D4", f: 293.66 }] }
        ];
        const TIPS = [
            { category: "Técnica", title: "El poder del toque ligero", content: "Muchos principiantes aprietan demasiado las cuerdas. Presiona solo lo necesario para que la nota suene limpia. Esto aumenta tu velocidad.", proTip: "Practica escalas usando un toque fantasma para desarrollar sensibilidad." },
            { category: "Cuidado", title: "Limpieza después de tocar", content: "El sudor y la grasa corroen las cuerdas. Pasa un paño de microfibra después de cada sesión.", proTip: "Usa un poco de limpiador de trastes cada 6 meses." },
            { category: "Teoría", title: "Entiende los Intervalos", content: "Aprende dónde está la tónica, la tercera y la quinta de cada acorde.", proTip: "La mayoría de los solos de rock se basan en saber dónde están las notas del acorde." }
        ];

        // --- STATE ---
        let currentTab = 'tuner';
        let isTunerActive = false;
        let isMetroPlaying = false;
        let bpm = 120;
        let audioCtx = null;
        let tunerAnalyser = null;
        let tunerStream = null;
        let tunerRAF = null;
        let smoothedCents = 0;
        const SMOOTHING_FACTOR = 0.15;
        let timerID = null;
        let nextNoteTime = 0;
        let taps = [];
        let ideas = JSON.parse(localStorage.getItem('guitar_ideas') || '[]');
        let selectedTuning = 0;
        let selectedTag = "Riff";
        const tags = ["Riff", "Progresión", "Letra", "Canción"];

        // --- TAB SWITCHING ---
        function switchTab(tabId) {
            if (tabId !== 'tuner' && isTunerActive) stopTuner();
            if (tabId === 'tuner' && isMetroPlaying) toggleMetro();

            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tabId}-tab`).classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-amber-100', 'bg-white/5', 'border', 'border-white/10');
                b.classList.add('text-zinc-500');
            });
            const activeBtn = document.getElementById(`nav-${tabId}`);
            activeBtn.classList.remove('text-zinc-500');
            activeBtn.classList.add('text-amber-100', 'bg-white/5', 'border', 'border-white/10');

            currentTab = tabId;
            if (tabId === 'ideas') renderIdeas();
            if (tabId === 'tips') renderTips();
        }

        // --- TUNER LOGIC ---
        function autoCorrelate(buffer, sampleRate) {
            let SIZE = buffer.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) { const v = buffer[i]; rms += v * v; }
            rms = Math.sqrt(rms / SIZE);
            
            // Visual feedback for signal level
            const signalMeter = document.getElementById('signal-level');
            if (signalMeter) {
                const level = Math.min(100, rms * 500); // Scale for visibility
                signalMeter.style.width = `${level}%`;
                signalMeter.style.backgroundColor = level > 10 ? 'rgba(245, 158, 11, 0.4)' : 'rgba(245, 158, 11, 0.1)';
            }

            if (rms < 0.001) return null; // Much more sensitive threshold (was 0.005)

            // Search range for frequency (70Hz to 1200Hz)
            const minPeriod = Math.floor(sampleRate / 1200);
            const maxPeriod = Math.floor(sampleRate / 70);
            
            // Optimization: Only check the relevant period range for guitar
            const correlations = new Float32Array(maxPeriod + 2);
            
            for (let period = minPeriod; period <= maxPeriod; period++) {
                let diff = 0;
                for (let i = 0; i < SIZE - period; i++) {
                    diff += Math.abs(buffer[i] - buffer[i + period]);
                }
                correlations[period] = 1 - (diff / (SIZE - period));
            }

            // Peak picking: Find the FIRST significant peak to avoid octave jumping
            let bestPeriod = -1;
            const threshold = 0.82; 
            
            for (let p = minPeriod + 1; p < maxPeriod; p++) {
                if (correlations[p] > threshold && correlations[p] > correlations[p - 1] && correlations[p] > correlations[p + 1]) {
                    bestPeriod = p;
                    break;
                }
            }

            if (bestPeriod === -1) return null;

            // Parabolic interpolation for sub-sample accuracy
            let T0 = bestPeriod;
            const x1 = correlations[bestPeriod - 1], x2 = correlations[bestPeriod], x3 = correlations[bestPeriod + 1];
            const a = (x1 + x3 - 2 * x2) / 2;
            const b = (x3 - x1) / 2;
            if (a) T0 = bestPeriod - b / (2 * a);

            return sampleRate / T0;
        }


        async function toggleTuner() {
            if (!isTunerActive) {
                try {
                    tunerStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            autoGainControl: true, // Allow some gain control for quiet mics
                            noiseSuppression: false,
                            channelCount: 1
                        }
                    });
                    const AC = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AC();
                    const analyser = ctx.createAnalyser();
                    analyser.fftSize = 4096; // Standard size for efficiency and accuracy

                    // Add a Low Pass Filter to clean up harmonics (very helpful for guitar)
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1200; 

                    const source = ctx.createMediaStreamSource(tunerStream);
                    source.connect(filter);
                    filter.connect(analyser);

                    audioCtx = ctx;
                    tunerAnalyser = analyser;
                    isTunerActive = true;

                    document.getElementById('tuner-idle').classList.add('hidden');
                    document.getElementById('tuner-active').classList.remove('hidden');
                    document.getElementById('tuner-toggle').innerHTML = `<div class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div> Stop Tuning`;
                    document.getElementById('tuner-toggle').classList.replace('bg-amber-100', 'bg-zinc-900');
                    document.getElementById('tuner-toggle').classList.add('text-rose-400', 'border-rose-500/20');

                    updateTuner();
                } catch (e) { alert("Mic access denied or error: " + e.message); }
            } else {
                stopTuner();
            }
        }

        function stopTuner() {
            isTunerActive = false;
            cancelAnimationFrame(tunerRAF);
            if (tunerStream) tunerStream.getTracks().forEach(t => t.stop());
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            document.getElementById('tuner-idle').classList.remove('hidden');
            document.getElementById('tuner-active').classList.add('hidden');
            document.getElementById('tuner-toggle').innerHTML = `<i data-lucide="mic" class="w-4 h-4"></i> Initialize Tuner`;
            document.getElementById('tuner-toggle').classList.replace('bg-zinc-900', 'bg-amber-100');
            document.getElementById('tuner-toggle').classList.remove('text-rose-400', 'border-rose-500/20');
            document.getElementById('needle').style.transform = `translateX(0px)`;
            lucide.createIcons();
        }

        function updateTuner() {
            if (!isTunerActive) return;
            const buffer = new Float32Array(tunerAnalyser.fftSize);
            tunerAnalyser.getFloatTimeDomainData(buffer);

            // Refined Autocorrelation
            const freq = autoCorrelate(buffer, audioCtx.sampleRate);

            if (freq && freq > 50 && freq < 1000) { // Practical guitar range
                const noteNum = Math.round(12 * (Math.log(freq / 440) / Math.log(2))) + 69;
                const expected = 440 * Math.pow(2, (noteNum - 69) / 12);
                const cents = Math.floor((1200 * Math.log(freq / expected)) / Math.log(2));

                document.getElementById('active-note').innerText = NOTE_STRINGS[noteNum % 12];
                document.getElementById('active-freq').innerText = `${freq.toFixed(2)} Hz`;

                const status = document.getElementById('active-status');
                const noteEl = document.getElementById('active-note');
                const needle = document.getElementById('needle');

                // Dynamic UI updates based on precision
                // Apply smoothing to the needle movement
                smoothedCents = smoothedCents + (cents - smoothedCents) * SMOOTHING_FACTOR;
                
                if (Math.abs(cents) < 3) {
                    status.innerText = "PERFECT";
                    status.className = "text-[10px] font-bold uppercase tracking-[0.3em] mt-2 px-3 py-1 bg-amber-400/10 rounded-full border border-amber-400/20 text-amber-200";
                    noteEl.className = "text-9xl font-light tracking-tighter transition-all duration-300 text-amber-200 drop-shadow-[0_0_25px_rgba(251,191,36,0.3)] scale-110";
                    needle.className = "absolute top-0 bottom-0 left-1/2 w-0.5 -ml-[0.125rem] bg-amber-400 transition-none z-20 shadow-[0_0_15px_rgba(251,191,36,0.8)]";
                } else if (Math.abs(cents) < 10) {
                    status.innerText = cents > 0 ? `+${cents} CENTS` : `${cents} CENTS`;
                    status.className = "text-[10px] font-bold uppercase tracking-[0.3em] mt-2 px-3 py-1 bg-zinc-900 rounded-full border border-white/10 text-zinc-300";
                    noteEl.className = "text-9xl font-light tracking-tighter transition-all duration-300 text-zinc-300";
                    needle.className = "absolute top-0 bottom-0 left-1/2 w-0.5 -ml-[0.125rem] bg-zinc-400 transition-none z-20";
                } else {
                    status.innerText = cents > 0 ? `+${cents} CENTS` : `${cents} CENTS`;
                    status.className = "text-[10px] font-bold uppercase tracking-[0.3em] mt-2 px-3 py-1 bg-zinc-900 rounded-full border border-white/5 text-zinc-600";
                    noteEl.className = "text-9xl font-light tracking-tighter transition-all duration-300 text-zinc-600";
                    needle.className = "absolute top-0 bottom-0 left-1/2 w-0.5 -ml-[0.125rem] bg-zinc-600 transition-none z-20";
                }
                needle.style.transform = `translateX(${smoothedCents * 1.8}px)`;
            }

            tunerRAF = requestAnimationFrame(updateTuner);
        }

        function setTuning(idx) {
            selectedTuning = idx;
            document.querySelectorAll('.tuning-btn').forEach((btn, i) => {
                btn.className = i === idx
                    ? "tuning-btn px-5 py-2.5 text-[10px] font-bold rounded-xl border border-white/10 bg-zinc-800 text-amber-100 shadow-xl uppercase tracking-widest shrink-0"
                    : "tuning-btn px-5 py-2.5 text-[10px] font-bold rounded-xl border border-white/5 bg-transparent text-zinc-500 uppercase tracking-widest shrink-0";
            });
        }

        // --- METRONOME LOGIC ---
        function toggleMetro() {
            if (!audioCtx || audioCtx.state === 'closed') {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (!isMetroPlaying) {
                isMetroPlaying = true;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
                document.getElementById('metro-text').innerText = "Stop";
                document.getElementById('metro-icon').setAttribute('data-lucide', 'pause');
                document.getElementById('metro-toggle').className = "w-32 h-32 rounded-[2.5rem] flex flex-col items-center justify-center gap-2 transition-all active:scale-[0.96] border border-white bg-amber-100 text-zinc-900 shadow-2xl";
            } else {
                isMetroPlaying = false;
                clearTimeout(timerID);
                document.getElementById('metro-text').innerText = "Start";
                document.getElementById('metro-icon').setAttribute('data-lucide', 'play');
                document.getElementById('metro-toggle').className = "w-32 h-32 rounded-[2.5rem] flex flex-col items-center justify-center gap-2 transition-all active:scale-[0.96] border border-white/5 bg-zinc-900 text-amber-100 shadow-2xl";
            }
            lucide.createIcons();
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                const osc = audioCtx.createOscillator();
                const env = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, nextNoteTime);

                env.gain.setValueAtTime(1, nextNoteTime);
                env.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.05);

                osc.connect(env);
                env.connect(audioCtx.destination);

                osc.start(nextNoteTime);
                osc.stop(nextNoteTime + 0.05);

                // Visual Pulse
                setTimeout(() => {
                    const p = document.getElementById('metro-pulse');
                    p.className = "absolute inset-0 border-2 border-amber-400/40 rounded-full pointer-events-none scale-150 opacity-0 transition-all duration-300";
                    setTimeout(() => { p.className = "absolute inset-0 border-2 border-amber-400/0 rounded-full pointer-events-none"; }, 300);
                }, (nextNoteTime - audioCtx.currentTime) * 1000);

                nextNoteTime += (60 / bpm);
            }
            timerID = setTimeout(scheduler, 25);
        }

        function adjustBpm(val) {
            bpm = Math.max(30, Math.min(300, bpm + val));
            refreshBpm();
        }

        function refreshBpm() {
            document.getElementById('bpm-display').innerText = bpm;
            const names = ["Largo", "Adagio", "Andante", "Moderato", "Allegro", "Presto"];
            const limits = [60, 76, 108, 120, 168, 300];
            let name = names[names.length - 1];
            for (let i = 0; i < limits.length; i++) { if (bpm < limits[i]) { name = names[i]; break; } }
            document.getElementById('tempo-name').innerText = name;
        }

        document.getElementById('tap-btn').addEventListener('pointerdown', () => {
            const now = Date.now();
            taps = [...taps, now].slice(-4);
            if (taps.length > 1) {
                const ints = []; for (let i = 1; i < taps.length; i++) ints.push(taps[i] - taps[i - 1]);
                const avg = ints.reduce((a, b) => a + b) / ints.length;
                const calc = Math.round(60000 / avg);
                if (calc >= 30 && calc <= 300) { bpm = calc; refreshBpm(); }
            }
            document.getElementById('tap-btn').classList.add('bg-zinc-800', 'text-white');
            setTimeout(() => { document.getElementById('tap-btn').classList.remove('bg-zinc-800', 'text-white'); }, 100);
        });

        // --- TIPS LOGIC ---
        function renderTips() {
            const container = document.getElementById('tips-container');
            container.innerHTML = TIPS.map((tip, i) => `
                <div onclick="toggleTip(${i})" class="tip-card p-8 rounded-3xl border border-white/5 bg-zinc-900 hover:border-white/10 transition-all cursor-pointer group shadow-xl">
                    <div class="flex items-start justify-between">
                        <div class="flex flex-col gap-3">
                            <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-zinc-500">${tip.category}</span>
                            <h3 class="text-xl font-bold tracking-tight">${tip.title}</h3>
                        </div>
                        <div id="tip-chevron-${i}" class="transition-transform"><i data-lucide="chevron-right" class="w-4 h-4 text-zinc-500"></i></div>
                    </div>
                    <div id="tip-content-${i}" class="hidden mt-8 flex flex-col gap-6">
                        <p class="text-zinc-400 text-[15px] leading-[1.7]">${tip.content}</p>
                        <div class="p-6 bg-amber-50/5 rounded-2xl border border-amber-500/10 italic text-zinc-200 text-sm">"${tip.proTip}"</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTip(i) {
            const c = document.getElementById(`tip-content-${i}`);
            const ch = document.getElementById(`tip-chevron-${i}`);
            const isHidden = c.classList.contains('hidden');
            document.querySelectorAll('[id^="tip-content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tip-chevron-"]').forEach(el => el.style.transform = 'rotate(0deg)');
            if (isHidden) {
                c.classList.remove('hidden');
                ch.style.transform = 'rotate(90deg)';
                c.closest('.tip-card').classList.add('bg-[#111113]', 'border-amber-500/30', 'ring-1', 'ring-amber-500/10');
            } else {
                c.closest('.tip-card').classList.remove('bg-[#111113]', 'border-amber-500/30', 'ring-1', 'ring-amber-500/10');
            }
        }

        // --- IDEAS LOGIC ---
        function renderIdeas() {
            const list = document.getElementById('ideas-list');
            const search = document.getElementById('search-ideas').value.toLowerCase();
            const filtered = ideas.filter(i => i.content.toLowerCase().includes(search) || i.tag.toLowerCase().includes(search));

            list.innerHTML = filtered.length ? filtered.map(i => `
                <div class="bg-[#111113]/50 border border-white/5 rounded-3xl p-7 group shadow-xl">
                    <div class="flex items-start justify-between gap-6">
                        <div class="flex flex-col gap-4 flex-1">
                            <span class="w-fit px-3 py-1 rounded-lg bg-zinc-900 text-[9px] font-bold uppercase tracking-[0.3em] text-amber-200/80 border border-white/5">${i.tag}</span>
                            <p class="text-zinc-200 text-lg leading-[1.6] font-medium whitespace-pre-wrap">${i.content}</p>
                        </div>
                        <button onclick="deleteIdea('${i.id}')" class="p-3 rounded-xl bg-zinc-900 text-zinc-700 hover:text-white border border-white/5 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('') : `<div class="py-20 text-center opacity-20 uppercase text-[10px] tracking-widest font-bold">No inspirations recorded</div>`;
            lucide.createIcons();
        }

        function deleteIdea(id) {
            ideas = ideas.filter(i => i.id !== id);
            localStorage.setItem('guitar_ideas', JSON.stringify(ideas));
            renderIdeas();
        }

        function saveIdea() {
            const content = document.getElementById('idea-content').value;
            if (!content.trim()) return;
            ideas.unshift({ id: Math.random().toString(36).substr(2, 9), content, tag: selectedTag, timestamp: Date.now() });
            localStorage.setItem('guitar_ideas', JSON.stringify(ideas));
            document.getElementById('idea-content').value = '';
            document.getElementById('add-idea-form').classList.add('hidden');
            renderIdeas();
        }

        // --- MAIN ---
        document.getElementById('tuner-toggle').addEventListener('click', toggleTuner);
        document.getElementById('metro-toggle').addEventListener('click', toggleMetro);
        document.getElementById('toggle-add-idea').addEventListener('click', () => {
            const f = document.getElementById('add-idea-form');
            f.classList.toggle('hidden');
        });
        document.getElementById('search-ideas').addEventListener('input', renderIdeas);

        function initTags() {
            const container = document.getElementById('tag-selector');
            container.innerHTML = tags.map(t => `<button onclick="selectedTag='${t}'; initTags()" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] border transition-all ${selectedTag === t ? 'bg-amber-100 border-white text-zinc-900' : 'bg-zinc-900 border-white/5 text-zinc-600'}">${t}</button>`).join('');
        }

        // Initialize state
        renderTips();
        renderIdeas();
        initTags();
        lucide.createIcons();
    </script>
</body>

</html>
